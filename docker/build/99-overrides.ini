; File upload limits - reduced for security
upload_max_filesize = 10M
post_max_size = 10M

; XDebug configuration - only enable in development
; WARNING: XDebug should NEVER be enabled in production environments
; This configuration poses serious security risks if used in production
xdebug.mode = off
xdebug.client_host = host.docker.internal
xdebug.log_level = 0

; Enable XDebug only when explicitly requested via environment variable
; Set ENABLE_XDEBUG=1 to enable debugging in development
; xdebug.mode = debug (uncomment this line only for development)
